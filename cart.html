  <section class="cart-container">
    <div class="container-fluid" style="max-width: 1200px; margin: 0 auto;">
      <h2 class="cart-title"><strong>Shopping Cart</strong></h2>
      
      <div class="row">
        <!-- Cart Items -->
        <div class="col-12 col-lg-8">
          <div id="cartItems">
            <!-- Cart items will be inserted here -->
          </div>
          <div id="emptyCartMessage" style="display: none;">

        <div class="col-12 col-lg-4">
          <div class="cart-summary">
            <h4><strong>Order Summary</strong></h4>
            <div class="summary-row">
              <span>Subtotal</span>
              <span id="subtotal">RM 0.00</span>
            </div>
            <div class="summary-row">
              <span>Shipping</span>
              <span id="shipping">RM 5.00</span>
            </div>
            <div class="summary-row">
              <span>Tax (6%)</span>
              <span id="tax">RM 0.00</span>
            </div>
            <div class="summary-row total">
              <span>Total</span>
              <span id="total">RM 0.00</span>
            </div>
            <button class="checkout-btn" id="checkoutBtn" onclick="proceedToCheckout()">PROCEED TO CHECKOUT</button>

          </div>

  <script src="assets/bootstrap/js/bootstrap.bundle.min.js"></script>
  <script>
    // Initialize cart from localStorage
    let cart = JSON.parse(localStorage.getItem('cart')) || [];

    // Display cart items
    function displayCart() {
      const cartItemsContainer = document.getElementById('cartItems');
      const emptyCartMessage = document.getElementById('emptyCartMessage');
      const checkoutBtn = document.getElementById('checkoutBtn');

      cartItemsContainer.innerHTML = '';

      if (cart.length === 0) {
        emptyCartMessage.style.display = 'block';
        checkoutBtn.disabled = true;
        updateSummary();
        return;
      }

      emptyCartMessage.style.display = 'none';
      checkoutBtn.disabled = false;

      cart.forEach((item, index) => {
        const itemTotal = item.price * item.quantity;
        const cartItemHTML = `
          <div class="cart-item">
            <img src="${item.image || 'assets/images/placeholder.jpg'}" alt="${item.name}" class="cart-item-image">
            <div class="cart-item-details">
              <div class="cart-item-name">${item.name}</div>
              <div class="cart-item-price">RM ${item.price.toFixed(2)}</div>
              <div style="color: #1a1a1a; font-weight: 600; margin-top: 8px;">Subtotal: <span style="color: #C99797;">RM ${itemTotal.toFixed(2)}</span></div>
              <div class="quantity-control">
                <span class="quantity-label">Qty:</span>
                <button class="quantity-btn" onclick="decreaseQuantity(${index})">−</button>
                <span class="quantity-value">${item.quantity}</span>
                <button class="quantity-btn" onclick="increaseQuantity(${index})">+</button>
                <button class="remove-btn" onclick="removeFromCart(${index})">Remove</button>
              </div>
            </div>
          </div>
        `;
        cartItemsContainer.innerHTML += cartItemHTML;
      });

      updateSummary();
    }

    // Increase quantity
    function increaseQuantity(index) {
      cart[index].quantity++;
      localStorage.setItem('cart', JSON.stringify(cart));
      displayCart();
    }

    // Decrease quantity
    function decreaseQuantity(index) {
      if (cart[index].quantity > 1) {
        cart[index].quantity--;
      } else {
        removeFromCart(index);
        return;
      }
      localStorage.setItem('cart', JSON.stringify(cart));
      displayCart();
    }

    // Remove from cart
    function removeFromCart(index) {
      cart.splice(index, 1);
      localStorage.setItem('cart', JSON.stringify(cart));
      displayCart();
      updateCartBadge();
    }

    // Update summary
    function updateSummary() {
      const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
      const shipping = cart.length > 0 ? 5 : 0;
      const tax = subtotal * 0.06;
      const total = subtotal + shipping + tax;

      document.getElementById('subtotal').textContent = 'RM ' + subtotal.toFixed(2);
      document.getElementById('shipping').textContent = 'RM ' + shipping.toFixed(2);
      document.getElementById('tax').textContent = 'RM ' + tax.toFixed(2);
      document.getElementById('total').textContent = 'RM ' + total.toFixed(2);
    }

    // Update cart badge
    function updateCartBadge() {
      const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
      document.getElementById('cartBadge').textContent = totalItems;
    }

    // Proceed to checkout - REDIRECT TO CHECKOUT.HTML
    function proceedToCheckout() {
      if (!cart || cart.length === 0) {
        alert('Your cart is empty!');
        return;
      }

      // Ensure cart is up-to-date in localStorage
      localStorage.setItem('cart', JSON.stringify(cart));

      // Optionally save a checkout timestamp
      localStorage.setItem('checkout_at', new Date().toISOString());

      // Redirect to checkout page
      window.location.href = 'checkout.html';
    }

    // Initialize on page load
    displayCart();
    updateCartBadge();
  </script>
